<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
</head>
<body>

    <div id="navbar"></div>

    <div class="container mt-4">


        <input type="text" id="searchBox"
               class="form-control mb-3"
               placeholder="Search question...">
        <h5 id="progress" class="text-success mb-3"></h5>
        <h6 id="daily" class="text-warning"></h6>

        <select id="categoryFilter" class="form-select mb-3">
            <option value="All">All</option>
            <option value="CSharp">C#</option>
            <option value="SQL">SQL</option>
        </select>

        <div class="card shadow">
            <div class="card-body" id="questionBox"></div>
        </div>

        <div class="text-center mt-3">
            <button class="btn btn-primary me-2" onclick="loadQuestion()">Next</button>
            <button class="btn btn-success" onclick="toggleAnswer()">Show Answer</button>
            <button class="btn btn-warning" onclick="markWeak()">Mark as Weak</button>
        </div>

    </div>

    <script src="js/common.js"></script>
    <script src="js/script.js"></script>
    <script>
        loadNavbar();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-csharp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
</body>
</html>
