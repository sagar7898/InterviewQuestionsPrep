<!DOCTYPE html>
<html>
<head>
    <title>Weak Questions</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div id="navbar"></div>

    <div class="container mt-4">
        <h3>Weak Questions</h3>

        <div id="weakList"></div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        loadNavbar();

        let weakQuestions = JSON.parse(localStorage.getItem("weak")) || [];

        let html = "";

        if (weakQuestions.length === 0) {
            html = "<p>No weak questions yet</p>";
        } else {
            weakQuestions.forEach(q => {
                html += `
                        <div class="card mb-3">
                            <div class="card-body">
                                <h5>${q.category}</h5>
                                <p><b>Q:</b> ${q.question}</p>
                                <p><b>Answer:</b> ${q.shortAnswer}</p>
                                 <button onclick="removeWeak(${q.id})" 
                        class="btn btn-danger btn-sm">
                    Remove
                </button>
                            </div>
                        </div>
                    `;
            });
        }

        document.getElementById("weakList").innerHTML = html;

        function removeWeak(id) {
            let weakQuestions = JSON.parse(localStorage.getItem("weak")) || [];

            weakQuestions = weakQuestions.filter(q => q.id !== id);

            localStorage.setItem("weak", JSON.stringify(weakQuestions));

            location.reload(); // refresh page
        }
    </script>

</body>
</html>
